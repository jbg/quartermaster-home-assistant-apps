name: Quartermaster
version: "1.2.4"
slug: quartermaster
description: Self-hosted kitchen inventory for your household
url: https://github.com/jbg/quartermaster
arch:
  - amd64
  - aarch64
startup: application
boot: auto
image: ghcr.io/jbg/quartermaster
ingress: true
ingress_port: 8080
ports:
  8080/tcp: null
ports_description:
  8080/tcp: Quartermaster web and API (not used for ingress)
watchdog: http://[HOST]:[PORT:8080]/healthz
backup: hot
stage: experimental
options:
  public_base_url: ""
  registration_mode: first_run_only
  expiry_reminders_enabled: true
  expiry_reminder_lead_days: 1
  expiry_reminder_fire_hour: 9
  expiry_reminder_fire_minute: 0
  auth_session_sweep_interval_seconds: 86400
  expiry_reminder_sweep_interval_seconds: 3600
  log_format: json
  rust_log: info
schema:
  public_base_url: str?
  registration_mode: list(first_run_only|invite_only|open)
  expiry_reminders_enabled: bool
  expiry_reminder_lead_days: int(0,)
  expiry_reminder_fire_hour: int(0,23)
  expiry_reminder_fire_minute: int(0,59)
  auth_session_sweep_interval_seconds: int(0,)
  expiry_reminder_sweep_interval_seconds: int(0,)
  log_format: list(text|json)
  rust_log: str
