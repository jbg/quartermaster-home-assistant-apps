name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate Home Assistant app metadata
        uses: frenck/action-addon-linter@v2
        with:
          path: ./quartermaster
